<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Primary Theme: Cyan-700 (#0e7490) -->
  
  <!-- Book Cover (Theme Color: Cyan-700) -->
  <path d="M 50 85 Q 40 82 10 90 L 10 25 Q 40 18 50 20 Q 60 18 90 25 L 90 90 Q 60 82 50 85 Z" fill="#0e7490" />

  <!-- Book Spine Center (Theme: Cyan-900) -->
  <line x1="50" y1="20" x2="50" y2="85" stroke="#164e63" stroke-width="2.5" />

  <!-- Left Pages (Light Cyan: Cyan-50) -->
  <path d="M 50 82 Q 40 79 12 87 L 12 22 Q 40 15 50 17 Z" fill="#ecfeff" stroke="#0e7490" stroke-width="0.3" />
  <!-- Right Pages (Light Cyan: Cyan-50) -->
  <path d="M 50 82 Q 60 79 88 87 L 88 22 Q 60 15 50 17 Z" fill="#ecfeff" stroke="#0e7490" stroke-width="0.3" />

  <!-- Glowing Lightbulb (Theme: Cyan-400) -->
  <g transform="translate(50, 40)">
    <!-- Cyan Glow Aura -->
    <circle cx="0" cy="0" r="30" fill="#22d3ee" opacity="0.2" />
    
    <!-- Bulb Glass (Theme: Cyan-400) -->
    <circle cx="0" cy="-3" r="14" fill="#22d3ee" fill-opacity="0.9" stroke="#0891b2" stroke-width="2" />
    
    <!-- Bulb Base (Theme: Slate-700) -->
    <path d="M -5 10 L 5 10 L 3 15 L -3 15 Z" fill="#334155" />
    
    <!-- Cyan Rays (Cyan-300) -->
    <g stroke="#67e8f9" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-28" x2="0" y2="-23" />
      <line x1="20" y1="-20" x2="15" y2="-15" />
      <line x1="28" y1="0" x2="21" y2="0" />
      <line x1="-20" y1="-20" x2="-15" y2="-15" />
      <line x1="-28" y1="0" x2="-21" y2="0" />
    </g>
  </g>
</svg>
